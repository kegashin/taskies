name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PROJECT: Taskies.xcodeproj
  SCHEME: Taskies

jobs:
  release:
    name: Build release DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcodebuild -list -project "$PROJECT"

      - name: Build release app
        run: |
          DERIVED_DATA="$RUNNER_TEMP/TaskiesDerivedData"

          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package app DMG
        run: |
          DERIVED_DATA="$RUNNER_TEMP/TaskiesDerivedData"
          ARTIFACT_DIR="$RUNNER_TEMP/TaskiesArtifacts"

          mkdir -p "$ARTIFACT_DIR"
          APP_PATH="$DERIVED_DATA/Build/Products/Release/Taskies.app"
          DMG_PATH="$ARTIFACT_DIR/Taskies.dmg"

          test -d "$APP_PATH"
          hdiutil create \
            -volname "Taskies" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$DMG_PATH"
          shasum -a 256 "$DMG_PATH" > "$DMG_PATH.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taskies-release-${{ github.ref_name }}
          path: |
            ${{ runner.temp }}/TaskiesArtifacts/Taskies.dmg
            ${{ runner.temp }}/TaskiesArtifacts/Taskies.dmg.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          DMG_PATH: ${{ runner.temp }}/TaskiesArtifacts/Taskies.dmg
          SHA_PATH: ${{ runner.temp }}/TaskiesArtifacts/Taskies.dmg.sha256
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$DMG_PATH" "$SHA_PATH" --clobber
          else
            gh release create "$TAG_NAME" "$DMG_PATH" "$SHA_PATH" \
              --title "Taskies $TAG_NAME" \
              --generate-notes
          fi
