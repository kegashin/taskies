name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: Taskies.xcodeproj
  SCHEME: Taskies

jobs:
  build:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcodebuild -list -project "$PROJECT"

      - name: Run tests
        run: bash scripts/test.sh

      - name: Build release app
        run: bash scripts/build-release.sh

      - name: Package app DMG
        run: bash scripts/package-dmg.sh

      - name: Upload downloadable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Taskies-dmg
          path: |
            ${{ runner.temp }}/TaskiesArtifacts/Taskies.dmg
            ${{ runner.temp }}/TaskiesArtifacts/Taskies.dmg.sha256
          if-no-files-found: error
          retention-days: 14
