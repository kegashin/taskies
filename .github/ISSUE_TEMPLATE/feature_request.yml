name: Feature request
description: Suggest a small improvement for Taskies.
title: "idea: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Taskies do?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Screenshots, references, or constraints.

