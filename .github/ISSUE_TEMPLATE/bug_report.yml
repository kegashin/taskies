name: Bug report
description: Report something broken in Taskies.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Taskies
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "14.6"
    validations:
      required: true
  - type: input
    id: taskies
    attributes:
      label: Taskies version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: media
    attributes:
      label: Screenshots or screen recording
      description: Add visual context when the issue is UI-related.

